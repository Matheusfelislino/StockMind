version: '3.9'

networks:
  stockmind-network:
    driver: bridge

volumes:
  postgres-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: stockmind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stockmind
      POSTGRES_USER: stockmind
      POSTGRES_PASSWORD: stockmind
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - stockmind-network

  redis:
    image: redis:7-alpine
    container_name: stockmind-redis
    ports:
      - "6379:6379"
    networks:
      - stockmind-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stockmind-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: stockmind
      RABBITMQ_DEFAULT_PASS: stockmind
    networks:
      - stockmind-network

  backend:
    build: ./backend
    container_name: stockmind-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    environment:
      DB_URL: jdbc:postgresql://stockmind-postgres:5432/stockmind
      DB_USERNAME: stockmind
      DB_PASSWORD: stockmind
      REDIS_HOST: stockmind-redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: stockmind-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: stockmind
      RABBITMQ_PASSWORD: stockmind
    networks:
      - stockmind-network

  ai-engine:
    build: ./ai-engine
    container_name: stockmind-ai-engine
    restart: unless-stopped
    depends_on:
      - postgres
      - rabbitmq
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: stockmind
      RABBITMQ_PASSWORD: stockmind
      DATABASE_URL: postgresql://stockmind:stockmind@postgres:5432/stockmind
      RABBITMQ_EXCHANGE: stockmind.intelligence.exchange
      QUEUE_NIGHTLY_FORECAST_TRIGGER: queue.nightly.forecast.trigger
      QUEUE_FORECAST_RESULT: queue.forecast.result
      QUEUE_PURCHASE_RECOMMENDATION: queue.purchase.recommendation
      FORECAST_HORIZON_DAYS: 30
      EXPIRATION_RISK_DAYS: 60
    networks:
      - stockmind-network
